name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath dalamud

      - name: Bump version
        if: github.ref == 'refs/heads/master'
        shell: pwsh
        run: |
          $csproj = "HiAuRo/HiAuRo.csproj"
          $nuspec = "HiAuRo.Sdk.nuspec"
          $m = Select-String -Path $csproj -Pattern '<Version>(.*?)</Version>'
          $cur = $m.Matches[0].Groups[1].Value
          $p = $cur.Split('.')
          $new = "$([int]$p[0]).$([int]$p[1]).$([int]$p[2] + 1)"
          Write-Host "Bump: $cur → $new"
          (Get-Content $csproj) -replace "<Version>$cur</Version>", "<Version>$new</Version>" | Set-Content $csproj
          (Get-Content $nuspec) -replace "<version>$cur</version>", "<version>$new</version>" | Set-Content $nuspec
          "NEW_VERSION=$new" >> $env:GITHUB_ENV

      - name: Build
        run: dotnet build HiAuRo.slnx -c Release
        env:
          DALAMUD_HOME: ${{ github.workspace }}\dalamud

      - name: Pack NuGet
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force sdk\lib\net10.0 | Out-Null
          Copy-Item HiAuRo\bin\Release\HiAuRo.dll sdk\lib\net10.0\
          Copy-Item HiAuRo\bin\Release\HiAuRo.deps.json sdk\lib\net10.0\ -ErrorAction SilentlyContinue

          Copy-Item HiAuRo\bin\Release\OmenTools.dll sdk\lib\net10.0\
          foreach ($dll in @("Dalamud.dll","Dalamud.Common.dll","Dalamud.Bindings.ImGui.dll","FFXIVClientStructs.dll","Lumina.dll","Lumina.Excel.dll","ImGuiScene.dll","TerraFX.Interop.Windows.dll","Newtonsoft.Json.dll","Serilog.dll","CheapLoc.dll")) {
            Copy-Item "dalamud\$dll" "sdk\lib\net10.0\" -ErrorAction SilentlyContinue
          }
          Copy-Item HiAuRo.Sdk.nuspec sdk\
          Invoke-WebRequest https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile nuget.exe
          .\nuget.exe pack sdk\HiAuRo.Sdk.nuspec -OutputDirectory nupkg -BasePath sdk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HiAuRo-release
          path: |
            HiAuRo/bin/Release/HiAuRo-*.zip
            nupkg/*.nupkg

      - name: Commit & Tag
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HiAuRo/HiAuRo.csproj HiAuRo.Sdk.nuspec
          git commit -m "chore: bump version to v${{ env.NEW_VERSION }} [skip ci]"
          git tag "v${{ env.NEW_VERSION }}"
          git push origin master
          git push origin "v${{ env.NEW_VERSION }}"

      - name: Create Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.NEW_VERSION }}
          files: |
            HiAuRo/bin/Release/HiAuRo-*.zip
            nupkg/*.nupkg
          generate_release_notes: true

  publish-nuget:
    needs: build
    runs-on: windows-latest
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: HiAuRo-release

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push nupkg\*.nupkg --source "https://api.nuget.org/v3/index.json" --api-key $env:NUGET_API_KEY --skip-duplicate

      - name: Publish to GitHub Packages
        run: dotnet nuget push nupkg\*.nupkg --source "https://nuget.pkg.github.com/denghaoxuan991876906/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: HiAuRo-release

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            HiAuRo/bin/Release/HiAuRo-*.zip
            nupkg/*.nupkg
          generate_release_notes: true
