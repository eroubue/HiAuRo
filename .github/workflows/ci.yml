name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath dalamud

      - name: Build
        run: dotnet build HiAuRo/HiAuRo.csproj -c Release
        env:
          DALAMUD_HOME: ${{ github.workspace }}\dalamud

      - name: Collect artifacts
        shell: pwsh
        run: |
          Copy-Item HiAuRo\bin\Release\HiAuRo.dll release\
          Copy-Item OmenTools\bin\Release\OmenTools.dll release\

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HiAuRo-release
          path: release/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: HiAuRo-release

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            HiAuRo.dll
            OmenTools.dll
          generate_release_notes: true
