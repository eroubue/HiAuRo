name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Helper DLL
        shell: pwsh
        run: |
          $rel = Invoke-RestMethod "https://api.github.com/repos/denghaoxuan991876906/HiAuRo.Helper/releases/latest"
          $asset = $rel.assets | Where-Object { $_.name -eq "HiAuRo.Helper.dll" } | Select-Object -First 1
          if ($asset) { Invoke-WebRequest $asset.browser_download_url -OutFile HiAuRo.Helper.dll }

      - name: Clone Helper
        run: git clone https://github.com/denghaoxuan991876906/HiAuRo.Helper.git HiAuRo.Helper --depth 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath dalamud

      - name: Build
        run: dotnet build HiAuRo/HiAuRo.csproj -c Release
        env:
          DALAMUD_HOME: ${{ github.workspace }}\dalamud

      - name: Pack NuGet
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force sdk\lib\net10.0 | Out-Null
          Copy-Item HiAuRo\bin\Release\HiAuRo.dll sdk\lib\net10.0\
          Copy-Item HiAuRo\bin\Release\HiAuRo.deps.json sdk\lib\net10.0\ -ErrorAction SilentlyContinue
          Copy-Item HiAuRo.Helper.dll sdk\lib\net10.0\ -ErrorAction SilentlyContinue
          Copy-Item OmenTools\bin\Release\OmenTools.dll sdk\lib\net10.0\
          foreach ($dll in @("Dalamud.dll","Dalamud.Common.dll","Dalamud.Bindings.ImGui.dll","FFXIVClientStructs.dll","Lumina.dll","Lumina.Excel.dll","ImGuiScene.dll","TerraFX.Interop.Windows.dll","Newtonsoft.Json.dll","Serilog.dll","CheapLoc.dll")) {
            Copy-Item "dalamud\$dll" "sdk\lib\net10.0\" -ErrorAction SilentlyContinue
          }
          Copy-Item HiAuRo.Sdk.nuspec sdk\
          Invoke-WebRequest https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile nuget.exe
          .\nuget.exe pack sdk\HiAuRo.Sdk.nuspec -OutputDirectory nupkg -BasePath sdk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HiAuRo-release
          path: |
            HiAuRo/bin/Release/HiAuRo.dll
            OmenTools/bin/Release/OmenTools.dll
            nupkg/*.nupkg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: HiAuRo-release

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish to GitHub Packages
        run: dotnet nuget push nupkg\*.nupkg --source "https://nuget.pkg.github.com/denghaoxuan991876906/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            HiAuRo.dll
            OmenTools.dll
            nupkg/*.nupkg
          generate_release_notes: true
