<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏战斗时间轴编辑器</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #080b12;
      color: #e0e0e0;
      overflow: hidden;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(26, 35,126,0.05) 0%, transparent 20%),
        radial-gradient(circle at 90% 80%, rgba(106,27,154,0.05) 0%, transparent 20%);
    }

    /* 布局 */
    .editor-layout {
      display: flex;
      height: 100vh;
    }

    /* 左侧面板 */
    .side-panel {
      width: 280px;
      background: #101622;
      border-right: 1px solid #1e293b;
      padding: 20px;
      overflow-y: auto;
    }

    .panel-title {
      font-size: 16px;
      color: #00f0ff;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .branch-item {
      padding: 10px 12px;
      background: #151b2b;
      border: 1px solid #1e293b;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .branch-item.active {
      border-color: #00f0ff;
      background: rgba(0,240,255,0.1);
    }

    .branch-item:hover {
      border-color: #00f0ff;
    }

    .action-btn {
      width: 100%;
      padding: 10px;
      background: #151b2b;
      border: 1px solid #00f0ff;
      color: #00f0ff;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 12px;
      transition: 0.2s;
    }

    .action-btn:hover {
      background: rgba(0,240,255,0.1);
    }

    /* 右侧时间轴画布 */
    .timeline-canvas {
      flex: 1;
      position: relative;
      overflow: auto;
      background: #0b101a;
    }

    /* 时间刻度 - 每5s一行 */
    .time-scale {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      pointer-events: none;
    }

    .time-line {
      height: 60px;
      border-top: 1px solid #1e293b;
      display: flex;
      align-items: center;
      padding-left: 10px;
      color: #64748b;
      font-size: 12px;
    }

    /* 多主轴容器 */
    .branches-container {
      position: absolute;
      top: 0;
      left: 100px;
      display: flex;
      gap: 140px;
      padding: 0 40px;
    }

    /* 单条主轴：包含顶部标签 + 贯穿竖主线 */
    .branch-track {
      width: 100px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 主轴纵向主线：从上到下贯穿整条时间轴 */
    .branch-main-line {
      width: 2px;
      background: linear-gradient(to bottom, #00f0ff, #0077aa);
      box-shadow: 0 0 8px #00f0ff;
      flex: 1;
    }

    .branch-label {
      position: sticky;
      top: 10px;
      background: #151b2b;
      padding: 6px 10px;
      border: 1px solid #00f0ff;
      color: #00f0ff;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
      z-index: 10;
      margin-bottom: 10px;
    }

    /* 事件节点 吸附在主轴线上 */
    .event-node {
      position: absolute;
      left: 50%;
      width: 22px;
      height: 22px;
      background: #00f0ff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: grab;
      box-shadow: 0 0 12px #00f0ff;
      z-index: 5;
    }

    .event-node::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* 事件之间跨分支连接线 */
    .connection-line {
      position: absolute;
      background: linear-gradient(90deg, #00f0ff, #7e57c2);
      height: 2px;
      z-index: 1;
      pointer-events: none;
    }

    /* 鼠标时间标线 */
    .mouse-time-marker {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: #ff4477;
      box-shadow: 0 0 10px #ff4477;
      z-index: 999;
      pointer-events: none;
    }

    /* 右键菜单 */
    .context-menu {
      position: absolute;
      width: 160px;
      background: #151b2b;
      border: 1px solid #00f0ff;
      border-radius: 6px;
      z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .context-menu div {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
    }

    .context-menu div:hover {
      background: rgba(0,240,255,0.1);
    }

    /* 编辑面板 */
    .edit-card {
      background: #151b2b;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
    }

    .form-item {
      margin-bottom: 12px;
    }

    .form-item label {
      display: block;
      font-size: 12px;
      color: #a0aec0;
      margin-bottom: 6px;
    }

    .form-item input {
      width: 100%;
      padding: 8px 10px;
      background: #0d111f;
      border: 1px solid #1e293b;
      border-radius: 4px;
      color: #fff;
    }

    .hide {
      display: none;
    }
  </style>
</head>

<body>
<div class="editor-layout">
  <!-- 左侧面板 -->
  <div class="side-panel">
    <div class="panel-title"><i class="fas fa-code-branch"></i> 战斗分支</div>
    <div id="branchList"></div>

    <div class="edit-card hide" id="editPanel">
      <div class="panel-title"><i class="fas fa-edit"></i> 事件编辑</div>
      <div class="form-item">
        <label>事件ID</label>
        <input type="text" id="eventId" readonly>
      </div>
      <div class="form-item">
        <label>触发时间 (s)</label>
        <input type="number" id="eventTime">
      </div>
      <div class="form-item">
        <label>事件名称</label>
        <input type="text" id="eventName">
      </div>
      <button class="action-btn" onclick="saveEvent()">保存修改</button>
      <button class="action-btn" onclick="deleteEvent()" style="border-color:#ff4477;color:#ff4477;margin-top:8px">删除事件</button>
    </div>

    <button class="action-btn" onclick="exportJSON()"><i class="fas fa-download"></i> 导出JSON</button>
  </div>

  <!-- 右侧时间轴 -->
  <div class="timeline-canvas" id="timelineCanvas">
    <div class="time-scale" id="timeScale"></div>
    <div class="branches-container" id="branchesContainer"></div>
    <div class="mouse-time-marker hide" id="mouseMarker"></div>
  </div>

  <!-- 右键菜单 -->
  <div class="context-menu hide" id="contextMenu">
    <div onclick="addEvent()">➕ 添加战斗事件</div>
  </div>
</div>

<script>
  // ============== 核心配置 ==============
  const TIME_STEP = 5;         // 每格5秒
  const LINE_HEIGHT = 60;      // 每行高度
  const MAX_TIME = 300;        // 最大时间5分钟
  const CANVAS_HEIGHT = (MAX_TIME / TIME_STEP) * LINE_HEIGHT;

  // 多分支数据
  let branches = [
    { id: 'branch1', name: '主角技能' },
    { id: 'branch2', name: 'BOSS技能' },
    { id: 'branch3', name: '场景机制' },
    { id: 'branch4', name: 'AI行为' }
  ];

  // 事件数据
  let events = [
    { id: 1, time: 5, branch: 'branch1', name: '普攻', target: null },
    { id: 2, time: 15, branch: 'branch1', name: '技能1', target: null },
    { id: 3, time: 10, branch: 'branch2', name: '挥砍', target: null },
    { id: 4, time: 25, branch: 'branch2', name: 'AOE', target: null }
  ];

  let selectedEvent = null;
  let draggingEvent = null;
  let canvas = document.getElementById('timelineCanvas');
  let marker = document.getElementById('mouseMarker');

  // ============== 初始化 ==============
  window.onload = function () {
    renderTimeScale();
    renderBranches();
    renderEvents();
    renderBranchList();
    bindEvents();
  };

  // 渲染时间刻度（从上到下 0s → 增大）
  function renderTimeScale() {
    let html = '';
    for (let t = 0; t <= MAX_TIME; t += TIME_STEP) {
      html += `<div class="time-line">${t}s</div>`;
    }
    document.getElementById('timeScale').innerHTML = html;
  }

  // 渲染多主轴：每条都有 顶部标签 + 从上到下贯穿竖主线
  function renderBranches() {
    let container = document.getElementById('branchesContainer');
    container.innerHTML = '';

    branches.forEach(b => {
      let div = document.createElement('div');
      div.className = 'branch-track';
      div.dataset.id = b.id;
      // 标签 + 贯穿整条的竖主线
      div.innerHTML = `
        <div class="branch-label">${b.name}</div>
        <div class="branch-main-line" style="height:${CANVAS_HEIGHT}px;"></div>
      `;
      container.appendChild(div);
    });
  }

  // 渲染所有事件 吸附在主轴竖线上
  function renderEvents() {
    document.querySelectorAll('.event-node, .connection-line').forEach(e => e.remove());

    events.forEach(ev => {
      let node = document.createElement('div');
      node.className = 'event-node';
      node.dataset.id = ev.id;
      // 按时间计算垂直位置
      node.style.top = `${ev.time / TIME_STEP * LINE_HEIGHT}px`;

      let track = document.querySelector(`.branch-track[data-id="${ev.branch}"]`);
      track.appendChild(node);
    });

    updateConnections();
  }

  // 跨事件连接线
  function updateConnections() {
    let container = document.getElementById('branchesContainer');
    events.forEach(a => {
      if (a.target) {
        let b = events.find(x => x.id == a.target);
        if (!b) return;

        let nodeA = document.querySelector(`.event-node[data-id="${a.id}"]`);
        let nodeB = document.querySelector(`.event-node[data-id="${b.id}"]`);

        let rectA = nodeA.getBoundingClientRect();
        let rectB = nodeB.getBoundingClientRect();
        let canvasRect = canvas.getBoundingClientRect();

        let x1 = rectA.left - canvasRect.left + rectA.width / 2;
        let y1 = rectA.top - canvasRect.top + rectA.height / 2;
        let x2 = rectB.left - canvasRect.left + rectB.width / 2;
        let y2 = rectB.top - canvasRect.top + rectB.height / 2;

        let line = document.createElement('div');
        line.className = 'connection-line';
        line.style.left = `${Math.min(x1, x2)}px`;
        line.style.top = `${(y1 + y2) / 2}px`;
        line.style.width = `${Math.abs(x2 - x1)}px`;
        container.appendChild(line);
      }
    });
  }

  // ============== 鼠标标线 ==============
  canvas.addEventListener('mousemove', (e) => {
    marker.classList.remove('hide');
    let y = e.clientY - canvas.getBoundingClientRect().top + canvas.scrollTop;
    marker.style.top = `${y}px`;
  });

  canvas.addEventListener('mouseleave', () => {
    marker.classList.add('hide');
  });

  // ============== 右键添加事件 ==============
  canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    let menu = document.getElementById('contextMenu');
    menu.style.left = `${e.clientX}px`;
    menu.style.top = `${e.clientY}px`;
    menu.classList.remove('hide');

    let y = e.clientY - canvas.getBoundingClientRect().top + canvas.scrollTop;
    let clickTime = Math.round(y / LINE_HEIGHT) * TIME_STEP;
    window.clickContextTime = clickTime < 0 ? 0 : clickTime > MAX_TIME ? MAX_TIME : clickTime;
  });

  document.addEventListener('click', () => {
    document.getElementById('contextMenu').classList.add('hide');
  });

  function addEvent() {
    let newId = Math.max(...events.map(e => e.id), 0) + 1;
    events.push({
      id: newId,
      time: window.clickContextTime || 0,
      branch: branches[0].id,
      name: '新事件',
      target: null
    });
    renderEvents();
  }

  // ============== 拖拽切换分支 / 调整时间 ==============
  function bindEvents() {
    document.addEventListener('mousedown', (e) => {
      let node = e.target.closest('.event-node');
      if (!node) return;
      let id = parseInt(node.dataset.id);
      draggingEvent = events.find(x => x.id === id);
      selectedEvent = draggingEvent;
      openEditPanel();
    });

    document.addEventListener('mousemove', (e) => {
      if (!draggingEvent) return;
      let y = e.clientY - canvas.getBoundingClientRect().top + canvas.scrollTop;
      let time = Math.round(y / LINE_HEIGHT) * TIME_STEP;
      draggingEvent.time = Math.max(0, Math.min(MAX_TIME, time));

      let x = e.clientX;
      let tracks = document.querySelectorAll('.branch-track');
      tracks.forEach(t => {
        let r = t.getBoundingClientRect();
        if (x > r.left && x < r.right) draggingEvent.branch = t.dataset.id;
      });

      renderEvents();
    });

    document.addEventListener('mouseup', () => {
      draggingEvent = null;
    });
  }

  // ============== 编辑面板 ==============
  function openEditPanel() {
    let p = document.getElementById('editPanel');
    p.classList.remove('hide');
    document.getElementById('eventId').value = selectedEvent.id;
    document.getElementById('eventTime').value = selectedEvent.time;
    document.getElementById('eventName').value = selectedEvent.name;
  }

  function saveEvent() {
    selectedEvent.time = parseInt(document.getElementById('eventTime').value);
    selectedEvent.name = document.getElementById('eventName').value;
    renderEvents();
  }

  function deleteEvent() {
    events = events.filter(e => e.id !== selectedEvent.id);
    selectedEvent = null;
    document.getElementById('editPanel').classList.add('hide');
    renderEvents();
  }

  // ============== 分支列表 ==============
  function renderBranchList() {
    let list = document.getElementById('branchList');
    list.innerHTML = '';
    branches.forEach(b => {
      let div = document.createElement('div');
      div.className = 'branch-item';
      div.innerText = b.name;
      list.appendChild(div);
    });
  }

  // ============== 导出JSON ==============
  function exportJSON() {
    let data = { branches, events };
    let blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '战斗时间轴.json';
    a.click();
  }
</script>
</body>
</html>
