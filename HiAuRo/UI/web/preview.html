<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiAuRo 效果预览</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <style>body{background:#1a1a2e}.bg-hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:rgba(255,255,255,0.04);pointer-events:none;user-select:none}</style>
</head>
<body>
    <div class="bg-hint">FFXIV Game World</div>

    <!-- ====== MainWindow ====== -->
    <div id="main-win" class="expanded">
        <div class="bar-header">
            <div class="status-dot running" id="status-dot"></div>
            <span class="status-label running" id="status-label">BRD</span>
            <div class="bar-divider hide-on-expand"></div>
            <div class="ctrl-btns">
                <button class="bar-btn" id="btn-pause" title="暂停">
                    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <button class="bar-btn" id="btn-acr" title="开关">
                    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                </button>
                <button class="bar-btn" id="btn-save" title="保存">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                </button>
            </div>
            <div class="bar-divider"></div>
            <button class="bar-btn expand" id="btn-expand" title="收起" onclick="toggleExpand()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
        </div>
        <div class="panel-body" id="panel-body">
            <div class="panel-actions">
                <span class="title">BRD 诗人</span>
                <div class="row-btns">
                    <button class="btn-sm acr-on" id="btn-acr-ex">停止</button>
                    <button class="btn-sm" id="btn-pause-ex">暂停</button>
                    <button class="btn-sm" id="btn-save-ex">保存</button>
                </div>
            </div>
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab(this,'tab-settings')">设置</button>
                <button class="tab-btn" onclick="switchTab(this,'tab-debug')">调试</button>
                <button class="tab-btn" onclick="switchTab(this,'tab-trigger')">触发器</button>
                <button class="tab-btn" onclick="switchTab(this,'tab-qt-set')">QT设置</button>
                <button class="tab-btn" onclick="switchTab(this,'tab-hk-set')">热键设置</button>
            </div>
            <div class="tab-body scrollable" id="tab-body">
                <div class="tab-content active" id="tab-settings">
                    <div class="set-group">
                        <div class="set-group-title">战斗</div>
                        <div class="set-row"><span class="set-label">智能模式</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                        <div class="set-row"><span class="set-label">AOE 模式</span><label class="ios-switch"><input type="checkbox"><span class="track"></span></label></div>
                        <div class="set-row"><span class="set-label">自动选敌</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                    </div>
                    <div class="set-group">
                        <div class="set-group-title">参数</div>
                        <div class="set-row"><span class="set-label">AOE 目标数</span><input class="set-slider" type="range" min="2" max="10" value="3" oninput="this.nextElementSibling.textContent=this.value"><span class="slider-val">3</span></div>
                        <div class="set-row"><span class="set-label">GCD 队列</span><select class="set-select"><option>200ms</option><option>150ms</option><option>100ms</option></select></div>
                        <div class="set-row"><span class="set-label">最大 oGCD</span><input class="set-input" type="number" value="2"></div>
                    </div>
                </div>
                <div class="tab-content" id="tab-debug">
                    <div class="set-group"><div class="set-group-title">日志</div>
                        <div class="set-row"><span class="set-label">调试模式</span><label class="ios-switch"><input type="checkbox"><span class="track"></span></label></div>
                        <div class="set-row"><span class="set-label">战斗日志</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                    </div>
                    <div class="set-group"><div class="set-group-title">当前</div><div class="set-label" style="padding:4px 0;color:var(--text-secondary)">职业: BRD | GCD: 2.50s | 歌曲: 军神</div></div>
                </div>
                <div class="tab-content" id="tab-trigger">
                    <div class="set-group"><div class="set-group-title">演出轴</div>
                        <div class="set-row"><span class="set-label">启用</span><label class="ios-switch"><input type="checkbox"><span class="track"></span></label></div>
                        <div class="set-row"><span class="set-label">来源</span><select class="set-select"><option>自动</option><option>Cactbot</option><option>自定义</option></select></div>
                    </div>
                </div>
                <div class="tab-content" id="tab-qt-set">
                    <div class="set-group"><div class="set-group-title">布局</div>
                        <div class="set-row"><span class="set-label">每行列数</span><select class="set-select"><option>2</option><option>3</option><option selected>4</option><option>5</option></select></div>
                    </div>
                    <div class="set-group"><div class="set-group-title">显示/隐藏</div>
                        <div class="set-row"><span class="set-label">智能模式</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                        <div class="set-row"><span class="set-label">AOE 模式</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                        <div class="set-row"><span class="set-label">自动选敌</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                        <div class="set-row"><span class="set-label">停手</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                    </div>
                </div>
                <div class="tab-content" id="tab-hk-set">
                    <div class="set-group"><div class="set-group-title">布局</div>
                        <div class="set-row"><span class="set-label">每行列数</span><select class="set-select"><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>
                    </div>
                    <div class="set-group"><div class="set-group-title">显示/隐藏 + 快捷键</div>
                        <div class="set-row"><span class="set-label">疾跑</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                        <div class="set-row" style="padding-left:8px"><span class="set-label" style="font-size:10px;color:var(--text-tertiary)">快捷键</span><input class="set-input" value="F1" style="width:80px"></div>
                        <div class="set-row"><span class="set-label">爆发药</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                        <div class="set-row" style="padding-left:8px"><span class="set-label" style="font-size:10px;color:var(--text-tertiary)">快捷键</span><input class="set-input" placeholder="如 F1" style="width:80px"></div>
                        <div class="set-row"><span class="set-label">极限技</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                        <div class="set-row" style="padding-left:8px"><span class="set-label" style="font-size:10px;color:var(--text-tertiary)">快捷键</span><input class="set-input" placeholder="如 F1" style="width:80px"></div>
                        <div class="set-row"><span class="set-label">猛者强击</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                        <div class="set-row" style="padding-left:8px"><span class="set-label" style="font-size:10px;color:var(--text-tertiary)">快捷键</span><input class="set-input" value="F2" style="width:80px"></div>
                        <div class="set-row"><span class="set-label">失血箭</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                        <div class="set-row" style="padding-left:8px"><span class="set-label" style="font-size:10px;color:var(--text-tertiary)">快捷键</span><input class="set-input" value="F3" style="width:80px"></div>
                        <div class="set-row"><span class="set-label">战斗之声</span><label class="ios-switch"><input type="checkbox" checked><span class="track"></span></label></div>
                        <div class="set-row" style="padding-left:8px"><span class="set-label" style="font-size:10px;color:var(--text-tertiary)">快捷键</span><input class="set-input" placeholder="如 F1" style="width:80px"></div>
                    </div>
                </div>
            </div>
    </div>
    </div>

    <!-- QtWindow -->
    <div id="qt-panel">
        <div class="drag-dot"></div>
        <div class="drag-inner" style="--qt-cols:4">
            <button class="qt-chip on">智能模式</button>
            <button class="qt-chip">AOE 模式</button>
            <button class="qt-chip on">自动选敌</button>
            <button class="qt-chip">停手</button>
        </div>
    </div>

    <!-- HotkeyWindow -->
    <div id="hk-panel">
        <div class="drag-dot"></div>
        <div class="drag-inner" style="--hk-cols:3">
            <div class="hk-cell"><div class="hk-icon">⚡</div><div class="hk-label">疾跑</div><div class="hk-bind">F1</div></div>
            <div class="hk-cell"><div class="hk-icon">🧪</div><div class="hk-label">爆发药</div></div>
            <div class="hk-cell"><div class="hk-icon">💥</div><div class="hk-label">极限技</div></div>
            <div class="hk-cell"><div class="hk-icon">🔥</div><div class="hk-label">猛者强击</div><div class="hk-bind">F2</div></div>
            <div class="hk-cell"><div class="hk-icon">🩸</div><div class="hk-label">失血箭</div><div class="hk-bind">F3</div></div>
            <div class="hk-cell"><div class="hk-icon">📯</div><div class="hk-label">战斗之声</div></div>
        </div>
    </div>

    <script>
        let e = true;
        function toggleExpand() {
            e = !e;
            const w = document.getElementById('main-win'), b = document.getElementById('btn-expand');
            if (e) {
                w.classList.add('expanded');
                b.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>';
            } else {
                w.classList.remove('expanded');
                b.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 6 15 12 9 18"/></svg>';
            }
        }
        function switchTab(btn, id) {
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c=>{c.classList.remove('active');c.style.display='none'});
            const el = document.getElementById(id);
            el.classList.add('active');
            el.style.display = 'block';
        }

        function initCustomSelects(container) {
            const selects = container.querySelectorAll('select.set-select');
            selects.forEach(sel => {
                const wrapper = document.createElement('div');
                wrapper.className = 'custom-select';
                sel.parentNode.insertBefore(wrapper, sel);
                wrapper.appendChild(sel);

                const trigger = document.createElement('button');
                trigger.className = 'custom-select-trigger';
                trigger.textContent = sel.options[sel.selectedIndex]?.text || '';
                trigger.onclick = (e) => { e.stopPropagation(); wrapper.classList.toggle('open'); };
                wrapper.appendChild(trigger);

                const drop = document.createElement('div');
                drop.className = 'custom-select-drop';
                [...sel.options].forEach(opt => {
                    const div = document.createElement('div');
                    div.className = 'custom-select-opt' + (opt.selected ? ' selected' : '');
                    div.textContent = opt.text;
                    div.onclick = () => {
                        sel.value = opt.value;
                        trigger.textContent = opt.text;
                        wrapper.classList.remove('open');
                        sel.dispatchEvent(new Event('change', { bubbles: true }));
                    };
                    drop.appendChild(div);
                });
                wrapper.appendChild(drop);
            });
            document.onclick = (e) => {
                container.querySelectorAll('.custom-select.open').forEach(w => {
                    if (!w.contains(e.target)) w.classList.remove('open');
                });
            };
        }

        let p = false, on = true;
        function state() {
            const d=document.getElementById('status-dot'), l=document.getElementById('status-label'),
                bp=document.getElementById('btn-pause'), ba=document.getElementById('btn-acr'),
                bex=document.getElementById('btn-acr-ex'), bpx=document.getElementById('btn-pause-ex');
            if(!on){d.className='status-dot stopped';l.className='status-label stopped';l.textContent='已停止';bp.style.display='none';ba.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';bex.textContent='启动';bex.className='btn-sm acr-off';bpx.textContent='暂停';bpx.className='btn-sm'}
            else if(p){d.className='status-dot paused';l.className='status-label paused';l.textContent='已暂停';bp.style.display='';bp.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';ba.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>';bex.textContent='停止';bex.className='btn-sm acr-on';bpx.textContent='继续';bpx.className='btn-sm paused'}
            else{d.className='status-dot running';l.className='status-label running';l.textContent='BRD';bp.style.display='';bp.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';ba.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>';bex.textContent='停止';bex.className='btn-sm acr-on';bpx.textContent='暂停';bpx.className='btn-sm'}
        }
        document.getElementById('btn-pause').onclick = () => { p = !p; state(); };
        document.getElementById('btn-pause-ex').onclick = () => { p = !p; state(); };
        document.getElementById('btn-acr').onclick = () => { on = !on; if(on)p=false; state(); };
        document.getElementById('btn-acr-ex').onclick = () => { on = !on; if(on)p=false; state(); };
        document.getElementById('btn-save').onclick = () => {};
        document.getElementById('btn-save-ex').onclick = () => {};
        document.querySelectorAll('.hk-cell').forEach(c=>c.onclick=()=>{c.classList.add('flash');setTimeout(()=>c.classList.remove('flash'),600)});
        document.querySelectorAll('.qt-chip').forEach(c=>c.onclick=()=>c.classList.toggle('on'));
        document.querySelectorAll('.tab-content').forEach(c=>{c.classList.remove('active');c.style.display='none'});
        document.getElementById('tab-settings').classList.add('active');
        document.getElementById('tab-settings').style.display='block';

        initCustomSelects(document);

        // 面板拖拽
        function makeDraggable(panel, handle) {
            let mx, my, dx, dy;
            handle.style.cursor = 'move';
            handle.addEventListener('mousedown', (e) => {
                if (e.target.closest('button, input, select, .qt-chip, .hk-cell')) return;
                e.preventDefault();
                mx = e.clientX; my = e.clientY;
                const r = panel.getBoundingClientRect();
                dx = r.left; dy = r.top;
                const onMove = (e2) => {
                    panel.style.left = (dx + e2.clientX - mx) + 'px';
                    panel.style.top = (dy + e2.clientY - my) + 'px';
                    panel.style.right = 'auto'; panel.style.transform = 'none';
                };
                const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
                document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
            });
        }
        const mw = document.getElementById('main-win');
        makeDraggable(mw, mw.querySelector('.bar-header'));
        makeDraggable(document.getElementById('qt-panel'), document.querySelector('#qt-panel .drag-dot'));
        makeDraggable(document.getElementById('hk-panel'), document.querySelector('#hk-panel .drag-dot'));
    </script>
</body>
</html>
