<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiAuRo 时间轴编辑器</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="puppertino/buttons.css">
<link rel="stylesheet" href="puppertino/forms.css">
<link rel="stylesheet" href="puppertino/segmented-controls.css">
<link rel="stylesheet" href="puppertino-bridge.css">
<link rel="stylesheet" href="editor.css">
</head>
<body>
<div id="app">
  <header class="toolbar">
    <div class="p-segmented-controls">
      <button class="tab active" data-axis="execution">执行轴</button>
      <button class="tab" data-axis="assist">辅助轴</button>
    </div>
    <div class="actions">
      <button class="p-btn" id="btnNew">新建</button>
      <button class="p-btn" id="btnLoad">加载轴文件</button>
      <button class="p-btn p-prim-col" id="btnSave">保存</button>
      <button class="p-btn" id="btnSaveAs">另存</button>
      <button class="p-btn" id="btnExport">导出</button>
      <button class="p-btn" id="btnImport">导入</button>
      <button class="p-btn" id="btnImportTrigger" title="导入本地触发器定义（JSON粘贴）">📥 导入触发器</button>
      <button class="p-btn" id="btnLoadCatalog" title="从JSON文件加载触发器目录">📂 加载目录</button>
      <button class="p-btn" id="btnLoadFactAxisBar" title="加载事实轴文件">📋 事实轴</button>
      <span class="status" id="edStatus"></span>
    </div>
  </header>

  <main class="main">
    <aside class="fileside" id="filePanel">
      <div class="fileside-head">
        <span class="sidebar-label">文件</span>
        <button class="p-btn" id="btnPickDir" style="font-size:10px;padding:2px 8px">选择目录</button>
      </div>
      <div class="fileside-dir" id="fileDir">未选择目录</div>
      <div class="fileside-list" id="fileList">
        <div class="props-hint">点"选择目录"浏览文件</div>
      </div>
    </aside>

    <section class="editor-panel" id="treePanel">
      <div class="editor-scroll" id="treeScroll">
        <div class="empty-state" id="emptyTree">
          <div class="empty-icon">📄</div>
          <div class="empty-title">开始编辑时间轴</div>
          <button class="p-btn p-prim-col" id="btnNewBig">新建模板</button>
          <button class="p-btn" id="btnLoadBig" style="margin-top:6px">加载文件</button>
          <div style="margin-top:10px;font-size:11px;color:var(--tx2)">或拖拽 .json 到此处</div>
        </div>
        <div class="etree" id="etree" style="display:none"></div>
      </div>
    </section>

    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">轴信息</div>
        <div class="info-box">
          <div class="info-row"><span class="info-key">轴类型</span><span class="info-val" id="infoType">—</span></div>
          <div class="info-row"><span class="info-key">文件名</span><span class="info-val" id="infoFile">—</span></div>
          <div class="info-row"><span class="info-key">副本ID</span><input class="info-input" type="number" id="territoryId" value="0" style="width:80px"></div>
          <div class="info-row"><span class="info-key">节点数</span><span class="info-val" id="infoCount">0</span></div>
          <div class="info-row"><span class="info-key">状态</span><span class="info-val" id="infoDirty">—</span></div>
        </div>
      </div>
      <!-- 元数据 -->
      <div class="sidebar-section">
        <div class="sidebar-label">元数据</div>
        <div class="props-scroll">
          <div style="margin:2px 0"><span style="font-size:11px;color:var(--tx2)">作者</span>
            <input class="prop-input" type="text" id="metaAuthor" placeholder="作者" style="width:100%">
          </div>
          <div style="margin:2px 0"><span style="font-size:11px;color:var(--tx2)">职业</span>
            <select class="prop-input" id="metaJob" style="width:100%">
              <option value="0">通用</option>
              <option value="25">BLM</option>
              <option value="20">MNK</option>
              <option value="24">WHM</option>
              <option value="23">BRD</option>
              <option value="22">WAR</option>
            </select>
          </div>
          <div style="margin:2px 0"><span style="font-size:11px;color:var(--tx2)">GUID</span>
            <input class="prop-input" type="text" id="metaGuid" readonly style="width:100%;font-size:10px;color:var(--tx2)">
          </div>
          <div style="margin:2px 0"><span style="font-size:11px;color:var(--tx2)">变量说明</span>
            <textarea class="prop-input" id="metaVarDesc" placeholder="多行说明..." style="width:100%;height:60px;margin-top:2px;resize:vertical;font-size:11px"></textarea>
          </div>
        </div>
      </div>
      <!-- 暴露变量 -->
      <div class="sidebar-section">
        <div class="sidebar-label">暴露变量</div>
        <div id="varList" style="max-height:120px;overflow-y:auto"></div>
        <button class="btn-sm" id="btnAddVar" style="margin-top:4px;font-size:11px">+ 添加变量</button>
      </div>
      <div class="sidebar-section" id="treeTools" style="display:none">
        <div class="sidebar-label">快捷添加</div>
        <div class="quick-btns">
          <button class="qbtn" data-add="treeSequence"><span class="qdot" style="background:#30d158"></span>序列</button>
          <button class="qbtn" data-add="treeCondNode"><span class="qdot" style="background:#15aabf"></span>条件</button>
          <button class="qbtn" data-add="treeActionNode"><span class="qdot" style="background:#f06595"></span>动作</button>
          <button class="qbtn" data-add="treeDelayNode"><span class="qdot" style="background:#fcc419"></span>延迟</button>
          <button class="qbtn" data-add="treeLoop"><span class="qdot" style="background:#ff375f"></span>循环</button>
          <button class="qbtn" data-add="treeParallel"><span class="qdot" style="background:#ff9f0a"></span>并行</button>
          <button class="qbtn" data-add="treeSelect"><span class="qdot" style="background:#bf5af2"></span>选择</button>
          <button class="qbtn" data-add="treeScriptNode"><span class="qdot" style="background:#4dabf7"></span>脚本</button>
        </div>
        <div class="sidebar-hint">选中父节点后点击添加</div>
      </div>
      <div class="sidebar-section props-section">
        <div class="sidebar-label" id="propsLabel">属性</div>
        <div class="props-scroll" id="propsBody">
          <div class="props-hint">点击节点或事件查看属性</div>
        </div>
      </div>
    </aside>
  </main>

  <footer class="footer"><span id="edFooter">就绪</span></footer>
  <input type="file" id="edFileInput" accept=".json,.txt" style="display:none">
  <input type="file" id="factFileInput" accept=".json" style="display:none">
</div>
<script src="editor.js"></script>
</body>
</html>
