<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiAuRo 事实轴编辑器</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="puppertino/buttons.css">
<link rel="stylesheet" href="puppertino/forms.css">
<link rel="stylesheet" href="puppertino/segmented-controls.css">
<link rel="stylesheet" href="puppertino-bridge.css">
<link rel="stylesheet" href="fact-editor.css">
</head>
<body>
<div id="app">
  <header class="toolbar">
    <div class="p-segmented-controls" id="phaseTabs"></div>
    <div class="actions">
      <button class="p-btn" id="btnNew">新建</button>
      <button class="p-btn" id="btnLoad">加载事实轴</button>
      <button class="p-btn p-prim-col" id="btnSave">保存</button>
      <button class="p-btn" id="btnExport">导出</button>
      <button class="p-btn" id="btnRecording">从录制导入</button>
    </div>
  </header>

  <main class="editor-layout">
    <aside class="sidebar-left" id="phaseList"></aside>

    <section class="timeline-canvas" id="timelineCanvas">
      <div class="timeline-scroll">
        <div class="timeline-body">
          <div class="time-scale" id="timeScale"></div>
          <div class="phase-wrapper">
            <div class="phase-tracks" id="phaseTracks"></div>
          </div>
        </div>
      </div>
      <div class="mouse-marker hide" id="mouseMarker"><span class="mouse-marker-label"></span></div>
    </section>

    <aside class="sidebar-right" id="propPanel"></aside>

    <aside class="sidebar-right" id="recordingPanel" style="display:none">
      <div class="recording-toolbar">
        <h3>录制数据</h3>
        <button class="p-btn" id="btnRecordingClose" style="padding:2px 8px;font-size:11px">关闭</button>
      </div>
      <div class="recording-info" id="recordingInfo"></div>
      <div class="recording-filters" id="recordingFilters"></div>
      <div class="recording-events" id="recordingEvents"></div>
      <div class="recording-actions">
        <button class="p-btn p-prim-col" id="btnImportToPhase">导入到当前阶段</button>
      </div>
    </aside>
  </main>

  <footer class="footer" id="footer"></footer>

  <div class="context-menu hide" id="ctxMenu"></div>
  <input type="file" id="fileInput" accept=".json,.txt">
  <input type="file" id="recordingFileInput" accept=".json" style="display:none">
</div>
<script src="fact-editor.js"></script>
</body>
</html>
