<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiAuRo 轴编辑器 — Drawflow</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="vendor/drawflow/dist/drawflow.min.css">
<link rel="stylesheet" href="axflow-editor.css">
</head>
<body>
<div id="app">

  <!-- Toolbar 工具栏 -->
  <header class="toolbar">
    <div class="toolbar-left">
      <button class="tab-btn active" data-axis="execution">执行轴</button>
      <button class="tab-btn" data-axis="assist">辅助轴</button>
    </div>
    <div class="toolbar-right">
      <div class="toolbar-actions">
        <button class="btn" id="btnNew">新建</button>
        <button class="btn" id="btnLoad">加载</button>
        <button class="btn btn-primary" id="btnSave">保存</button>
        <button class="btn" id="btnSaveAs">另存</button>
        <button class="btn" id="btnExport">导出</button>
        <button class="btn" id="btnImport">导入</button>
      </div>
    </div>
  </header>

  <!-- Main Area 主区域 -->
  <div class="main">

    <!-- Left: Node Palette 节点面板 -->
    <aside class="palette" id="palettePanel">
      <div class="palette-head" id="paletteToggle" onclick="togglePalette()" title="收起/展开面板">◀ 收起</div>
      <div class="palette-list" id="paletteList">
        <!-- JS 动态填充 -->
      </div>
      <div class="palette-tools">
        <button class="btn" id="btnLoadCatalog2" style="width:100%;font-size:12px;padding:3px 4px;margin:2px 0">📂 目录</button>
        <button class="btn" id="btnLoadFactAxisBar2" style="width:100%;font-size:12px;padding:3px 4px;margin:2px 0">📋 事实轴</button>
      </div>
    </aside>

    <!-- Center: Drawflow Canvas 画布 -->
    <div class="canvas-wrap" id="canvasWrap">
      <div id="drawflow" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

      <!-- Canvas overlay buttons -->
      <div class="canvas-btns canvas-btns-export">
        <div class="canvas-btn canvas-btn-export" id="btnCanvasExport" title="导出 JSON">Export</div>
        <div class="canvas-btn canvas-btn-clear" id="btnCanvasClear" title="清空画布">Clear</div>
      </div>
      <div class="canvas-btns canvas-btns-zoom">
        <div class="canvas-btn canvas-btn-zoom" id="btnZoomOut" title="缩小">−</div>
        <div class="canvas-btn canvas-btn-zoom" id="btnZoomReset" title="重置">◎</div>
        <div class="canvas-btn canvas-btn-zoom" id="btnZoomIn" title="放大">+</div>
      </div>
    </div>

    <!-- Right: Properties Sidebar 属性栏 -->
    <aside class="sidebar">
      <!-- Info 信息 -->
      <div class="sidebar-section">
        <div class="sidebar-label">轴信息</div>
        <div class="info-box">
          <div class="info-row"><span class="info-key">轴类型</span><span class="info-val" id="infoType">—</span></div>
          <div class="info-row"><span class="info-key">文件名</span><span class="info-val" id="infoFile">—</span></div>
          <div class="info-row"><span class="info-key">节点数</span><span class="info-val" id="infoCount">0</span></div>
          <div class="info-row"><span class="info-key">状态</span><span class="info-val" id="infoDirty">—</span></div>
        </div>
      </div>
      <!-- 元数据 -->
      <div class="sidebar-section">
        <div class="sidebar-label">元数据</div>
        <div class="props-scroll" style="display:flex;flex-direction:column;gap:4px">
          <div><span style="font-size:11px;color:var(--tx2)">作者</span>
            <input class="prop-input" type="text" id="metaAuthor" placeholder="作者" style="width:100%">
          </div>
          <div><span style="font-size:11px;color:var(--tx2)">职业</span>
            <select class="prop-input" id="metaJob" style="width:100%">
              <option value="0">通用</option>
              <option value="25">BLM</option>
            </select>
          </div>
          <div><span style="font-size:11px;color:var(--tx2)">GUID</span>
            <input class="prop-input" type="text" id="metaGuid" readonly style="width:100%;font-size:10px;color:var(--tx2)">
          </div>
          <div><span style="font-size:11px;color:var(--tx2)">变量说明</span>
            <textarea class="prop-input" id="metaVarDesc" placeholder="多行说明..." style="width:100%;height:60px;resize:vertical;font-size:11px"></textarea>
          </div>
        </div>
      </div>
      <!-- 暴露变量 -->
      <div class="sidebar-section">
        <div class="sidebar-label">暴露变量</div>
        <div id="varList" style="max-height:120px;overflow-y:auto"></div>
        <button class="btn" id="btnAddVar" style="margin-top:4px;font-size:11px;padding:2px 8px">+ 添加变量</button>
      </div>
      <!-- Axis Name 轴名称 -->
      <div class="sidebar-section">
        <div class="sidebar-label">轴名称</div>
        <input class="prop-input" type="text" id="axisName" value="新执行轴" style="width:100%">
        <div class="sidebar-label" style="margin-top:6px">副本 ID</div>
        <input class="prop-input" type="number" id="territoryId" value="0" style="width:120px">
      </div>
      <!-- Properties 属性 -->
      <div class="sidebar-props">
        <div class="sidebar-section" style="border-bottom:none">
          <div class="sidebar-label" id="propsLabel">节点属性</div>
          <div class="props-scroll" id="propsBody">
            <div class="props-hint">点击节点查看属性</div>
          </div>
        </div>
      </div>
    </aside>

  </div>

  <!-- Footer 底部 -->
  <footer class="footer" id="edFooter">
    <span class="meta-item">作者: <span id="ftAuthor">—</span></span>
    <span class="meta-item" style="font-size:10px">GUID: <span id="ftGuid" style="font-size:10px">—</span></span>
    <span class="meta-item">职业: <span id="ftJob">—</span></span>
    <span style="flex:1"></span>
    <span id="edStatus">就绪</span>
  </footer>

  <!-- Hidden file input -->
  <input type="file" id="edFileInput" accept=".json,.txt" style="display:none">
  <input type="file" id="catalogFileInput" accept=".json" style="display:none">
  <input type="file" id="factFileInput" accept=".json" style="display:none">

</div>

<script src="vendor/drawflow/dist/drawflow.min.js"></script>
<script src="axflow-editor.js"></script>
</body>
</html>
