<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dropdown Test</title>
<style>
:root {
    --bg0: #ffffff; --bg1: #f2f2f7; --bg2: #e5e5ea;
    --tx0: rgba(0,0,0,0.88); --tx1: rgba(0,0,0,0.55); --tx2: rgba(0,0,0,0.25);
    --fill: rgba(120,120,128,0.12); --fill2: rgba(120,120,128,0.08);
    --blue: #0a84ff; --green: #30d158; --orange: #ff9f0a; --red: #ff453a;
    --radius: 10px; --radius-sm: 6px; --radius-lg: 14px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
}
body { padding: 50px; font-family: var(--font); }

/* 修复前 - 有问题的CSS */
.ios-sel-old {
    position:relative; flex:1; min-width:0; cursor:pointer;
}
.ios-sel-old::before {
    content:''; position:absolute; right:10px; top:50%; z-index:2;
    width:0; height:0; border-left:4px solid transparent; border-right:4px solid transparent;
    border-top:5px solid var(--tx2); transform:translateY(-50%); transition:transform .15s; pointer-events:none;
}
.ios-sel-old.open::before { transform:translateY(-50%) rotate(180deg); }
.ios-sel-old-opt {
    font-family:var(--font); font-size:11px; padding:4px 24px 4px 8px;
    background:var(--fill2); color:var(--tx0);
    border:0.5px solid rgba(0,0,0,0.08); border-radius:6px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    display:block; transition:border-color .15s;
}
.ios-sel-old:hover .ios-sel-old-opt { border-color:rgba(0,0,0,0.15); }
.ios-sel-old.open .ios-sel-old-opt { border-color:var(--blue); border-radius:6px 6px 0 0; }
.ios-sel-old .ios-sel-old-opt + .ios-sel-old-opt {
    display:none; border-top:none; border-radius:0; margin-top:-1px;
}
.ios-sel-old.open .ios-sel-old-opt { display:block; }  /* 优先级不够 */
.ios-sel-old .ios-sel-old-opt:last-child { border-radius:0 0 6px 6px; }
.ios-sel-old .ios-sel-old-opt.sel { color:var(--blue); font-weight:500; }

/* 修复后 - 正确的CSS */
.ios-sel {
    position:relative; flex:1; min-width:0; cursor:pointer;
}
.ios-sel::before {
    content:''; position:absolute; right:10px; top:50%; z-index:2;
    width:0; height:0; border-left:4px solid transparent; border-right:4px solid transparent;
    border-top:5px solid var(--tx2); transform:translateY(-50%); transition:transform .15s; pointer-events:none;
}
.ios-sel.open::before { transform:translateY(-50%) rotate(180deg); }
.ios-sel-opt {
    font-family:var(--font); font-size:11px; padding:4px 24px 4px 8px;
    background:var(--fill2); color:var(--tx0);
    border:0.5px solid rgba(0,0,0,0.08); border-radius:6px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    display:block; transition:border-color .15s;
}
.ios-sel:hover .ios-sel-opt { border-color:rgba(0,0,0,0.15); }
.ios-sel.open .ios-sel-opt { border-color:var(--blue); border-radius:6px 6px 0 0; }
.ios-sel .ios-sel-opt + .ios-sel-opt {
    display:none; border-top:none; border-radius:0; margin-top:-1px;
}
.ios-sel.open > .ios-sel-opt { display:block; }  /* 修复：使用 > 提升优先级 */
.ios-sel .ios-sel-opt:last-child { border-radius:0 0 6px 6px; }
.ios-sel .ios-sel-opt.sel { color:var(--blue); font-weight:500; }

.test-box {
    margin: 20px 0;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
}
h3 { margin-top: 0; }
.good { color: green; }
.bad { color: red; }
</style>
</head>
<body>
<h1>下拉选择 CSS 修复测试</h1>

<div class="test-box">
    <h3 class="bad">修复前 (Broken)</h3>
    <div class="ios-sel-old open" style="width: 200px;" onclick="this.classList.toggle('open')">
        <div class="ios-sel-old-opt sel">选项 1</div>
        <div class="ios-sel-old-opt">选项 2</div>
        <div class="ios-sel-old-opt">选项 3</div>
    </div>
    <p>问题：只有第一个选项可见，其他被隐藏</p>
</div>

<div class="test-box">
    <h3 class="good">修复后 (Fixed)</h3>
    <div class="ios-sel open" style="width: 200px;" onclick="this.classList.toggle('open')">
        <div class="ios-sel-opt sel">选项 1</div>
        <div class="ios-sel-opt">选项 2</div>
        <div class="ios-sel-opt">选项 3</div>
    </div>
    <p>正常：所有选项都可见</p>
</div>

<div class="test-box">
    <h3>手动测试</h3>
    <p>点击上面的下拉框，看是否能展开显示所有3个选项</p>
    <ul>
        <li>"修复前"应该只能看到"选项 1"</li>
        <li>"修复后"应该能看到全部3个选项</li>
    </ul>
</div>

<script>
// 自动展开演示
setTimeout(() => {
    document.querySelectorAll('.ios-sel-old, .ios-sel').forEach(el => {
        el.classList.add('open');
    });
}, 500);
</script>
</body>
</html>
